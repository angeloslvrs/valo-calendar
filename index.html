<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCT // Match Schedule Sink</title>

  <!-- Valorant-style V favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='15,10 42,10 60,58 78,10 100,10 60,95' fill='%23FF4655'/><polygon points='8,32 26,32 42,68 8,32' fill='%23ECE8E1' opacity='0.7'/></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vd:  '#0F1923',
            vs:  '#1A242D',
            vc:  '#202B36',
            vr:  '#FF4655',
            vw:  '#ECE8E1',
            vg:  '#8B978F',
            vb:  '#2D3D4D',
          },
          fontFamily: {
            disp: ['Oswald', 'sans-serif'],
            tac:  ['Chakra Petch', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <style>
    body { background: #0F1923; overflow-x: hidden; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0F1923; }
    ::-webkit-scrollbar-thumb { background: #2D3D4D; }
    ::-webkit-scrollbar-thumb:hover { background: #FF4655; }

    .bg-grid {
      background-image:
        linear-gradient(to right,  rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .scanlines {
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
      );
    }

    /* Tactical clip-path corners */
    .cut-br { clip-path: polygon(0 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%); }
    .cut-tl { clip-path: polygon(14px 0, 100% 0, 100% 100%, 0 100%, 0 14px); }
    .cut-both { clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px); }

    /* Glitch hover */
    @keyframes glitch {
      0%, 100% { transform: translate(0); }
      20%       { transform: translate(-2px, 1px); }
      40%       { transform: translate(-1px, -1px); }
      60%       { transform: translate(2px, 1px); }
      80%       { transform: translate(1px, -1px); }
    }
    .glitch:hover { animation: glitch 0.25s cubic-bezier(.25,.46,.45,.94) infinite; }

    /* Card reveal */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-reveal { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }

    /* Button sweep effect */
    .btn-sweep {
      position: relative; overflow: hidden;
      transition: color 0.25s ease, border-color 0.25s ease;
    }
    .btn-sweep::before {
      content: ''; position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: #FF4655;
      transition: left 0.25s ease;
      z-index: 0;
    }
    .btn-sweep:hover::before { left: 0; }
    .btn-sweep > * { position: relative; z-index: 1; }
    .btn-sweep:hover { color: #0F1923; border-color: #FF4655; }

    /* Red line accent on card hover */
    .card-wrap {
      position: relative;
      transition: border-color 0.25s;
    }
    .card-wrap::after {
      content: '';
      position: absolute; bottom: -1px; left: 0;
      width: 0; height: 2px;
      background: #FF4655;
      transition: width 0.3s ease;
    }
    .card-wrap:hover::after { width: 100%; }
    .card-wrap:hover { border-color: rgba(255, 70, 85, 0.4) !important; }

    /* Copy button copied state */
    .copied-state { background: rgba(74,222,128,0.1) !important; border-color: #4ade80 !important; color: #4ade80 !important; }
    .copied-state::before { display: none; }
  </style>
</head>

<body class="font-tac text-vw antialiased relative min-h-screen flex flex-col">

  <!-- Overlays -->
  <div class="fixed inset-0 bg-grid pointer-events-none z-0"></div>
  <div class="fixed inset-0 scanlines pointer-events-none z-0 opacity-40"></div>

  <!-- Nav -->
  <nav class="relative z-30 border-b border-vb bg-vd/80 backdrop-blur-sm h-14 flex items-center justify-between px-6 lg:px-12">
    <div class="flex items-center gap-3">
      <svg class="h-7 w-7 drop-shadow-[0_0_8px_rgba(255,70,85,0.6)]" viewBox="0 0 100 100" fill="#FF4655">
        <polygon points="15,10 42,10 60,58 78,10 100,10 60,95"/>
        <polygon points="8,32 26,32 42,68 8,32" fill="#ECE8E1" opacity="0.75"/>
      </svg>
      <span class="font-disp font-bold tracking-[0.15em] uppercase text-sm text-vw">VCT Calendar Sink</span>
    </div>
    <div class="text-[10px] font-mono tracking-widest text-vg uppercase flex items-center gap-2">
      <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse inline-block"></span>
      Feed Live
    </div>
  </nav>

  <!-- Hero -->
  <header class="relative z-10 px-6 lg:px-12 pt-14 pb-10 max-w-5xl">
    <p class="text-vr text-xs font-bold tracking-[0.3em] uppercase mb-3 flex items-center gap-2">
      <i class="ph-fill ph-target"></i> VCT 2026 SEASON
    </p>
    <h1 class="font-disp font-bold text-5xl md:text-7xl uppercase leading-none tracking-tight text-vw mb-4">
      Match Schedule<br>
      <span class="text-transparent" style="-webkit-text-stroke: 1px #ECE8E1;">Into Your Calendar</span>
    </h1>
    <p class="text-vg text-base max-w-lg leading-relaxed">
      Subscribe to live match feeds for your teams. Auto-updates as schedules are confirmed on vlr.gg.
    </p>
  </header>

  <!-- Filter bar -->
  <div class="relative z-10 px-6 lg:px-12 pb-6 max-w-6xl">
    <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center">
      <!-- Region tabs -->
      <div id="region-tabs" class="flex gap-2 flex-wrap"></div>

      <!-- Search -->
      <div class="relative sm:ml-auto">
        <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-vg text-sm pointer-events-none"></i>
        <input id="search-input" type="text" placeholder="Search teams..."
          class="bg-vs border border-vb text-vw text-xs tracking-widest placeholder-vg pl-8 pr-4 py-2 cut-br focus:outline-none focus:border-vr transition-colors w-48 sm:w-56 font-tac">
      </div>
    </div>
  </div>

  <!-- Cards -->
  <main class="relative z-10 flex-grow px-6 lg:px-12 pb-24">
    <div id="cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 max-w-6xl"></div>
  </main>

  <!-- HUD Footer -->
  <footer class="fixed bottom-0 left-0 right-0 z-20 flex justify-between items-end px-6 pb-4 pointer-events-none">
    <div class="text-[9px] font-mono tracking-widest text-vb leading-5">
      SYS.STATUS // <span class="text-vg">ONLINE</span><br>
      DATA.SRC // <span class="text-vg">VLR.GG</span>
    </div>
    <div class="flex gap-1 items-center">
      <div class="w-6 h-0.5 bg-vr animate-pulse"></div>
      <div class="w-3 h-0.5 bg-vb"></div>
      <div class="w-10 h-0.5 bg-vb"></div>
    </div>
  </footer>

  <script>
    const BASE_URL = window.location.href.replace(/\/[^/]*$/, '/ics');

    const regionColor = {
      "Americas":     "#FF4655",
      "Pacific":      "#7C3AED",
      "EMEA":         "#F97316",
      "China":        "#EF4444",
      "International":"#6B7280",
    };

    const REGIONS = ["All", "Americas", "Pacific", "EMEA", "China"];

    let allTeams = [];
    let activeRegion = "All";
    let searchQuery = "";

    const container = document.getElementById("cards");

    function makeCard(team, delay) {
      const icsUrl    = `${BASE_URL}/${team.ics_file}`;
      const webcalUrl = icsUrl.replace(/^https?:/, "webcal:");
      const googleUrl = `https://calendar.google.com/calendar/r?cid=${encodeURIComponent(icsUrl)}`;
      const rColor    = regionColor[team.region] || "#FF4655";

      const article = document.createElement("article");
      article.className = "card-wrap card-reveal bg-vs border border-vb cut-br";
      article.style.animationDelay = `${delay}s`;
      article.dataset.region = team.region;
      article.dataset.name   = team.name.toLowerCase();

      const logoHtml = team.logo_url
        ? `<img src="${team.logo_url}" alt="${team.name} logo"
               class="h-12 w-12 object-contain"
               onerror="this.style.display='none'">`
        : `<div class="h-12 w-12 flex items-center justify-center text-vg text-xs font-bold uppercase">
             ${team.name.slice(0,2)}
           </div>`;

      const regionLogoHtml = team.region_logo_url
        ? `<img src="${team.region_logo_url}" alt="${team.region} logo"
               class="h-6 object-contain opacity-80"
               onerror="this.style.display='none'">`
        : "";

      article.innerHTML = `
        <div class="p-5">
          <div class="flex items-center justify-between mb-5">
            ${logoHtml}
            <div class="flex flex-col items-end gap-1">
              ${regionLogoHtml}
              <span class="text-[9px] font-bold tracking-[0.2em] uppercase"
                    style="color: ${rColor};">${team.region}</span>
            </div>
          </div>
          <h2 class="font-disp font-bold text-3xl uppercase leading-none tracking-wide text-vw mb-6 glitch cursor-default">${team.name}</h2>
          <div class="grid grid-cols-3 gap-1.5">
            <a href="${googleUrl}" target="_blank" rel="noopener"
               class="btn-sweep col-span-1 border border-vb bg-vc cut-tl py-3 flex flex-col items-center gap-1 no-underline text-vg"
               title="Add to Google Calendar">
              <i class="ph ph-google-logo text-lg"></i>
              <span class="text-[8px] tracking-widest uppercase">Google</span>
            </a>
            <a href="${webcalUrl}"
               class="btn-sweep col-span-1 border border-vb bg-vc py-3 flex flex-col items-center gap-1 no-underline text-vg"
               title="Subscribe in Apple Calendar">
              <i class="ph ph-apple-logo text-lg"></i>
              <span class="text-[8px] tracking-widest uppercase">Apple</span>
            </a>
            <button data-url="${icsUrl}"
               class="btn-sweep copy-btn col-span-1 border border-vb bg-vc cut-br py-3 flex flex-col items-center gap-1 text-vg cursor-pointer"
               title="Copy subscription link">
              <i class="ph ph-link text-lg"></i>
              <span class="text-[8px] tracking-widest uppercase">Copy</span>
            </button>
          </div>
        </div>
      `;

      article.querySelector(".copy-btn").addEventListener("click", e => {
        const btn = e.currentTarget;
        navigator.clipboard.writeText(btn.dataset.url).then(() => {
          btn.classList.add("copied-state");
          btn.querySelector("i").className = "ph-bold ph-check text-lg";
          btn.querySelector("span").textContent = "Copied";
          setTimeout(() => {
            btn.classList.remove("copied-state");
            btn.querySelector("i").className = "ph ph-link text-lg";
            btn.querySelector("span").textContent = "Copy";
          }, 2000);
        });
      });

      return article;
    }

    function renderCards() {
      container.innerHTML = "";
      const filtered = allTeams.filter(t => {
        const regionOk = activeRegion === "All" || t.region === activeRegion;
        const searchOk = !searchQuery || t.name.toLowerCase().includes(searchQuery);
        return regionOk && searchOk;
      });

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="col-span-full text-vg text-sm tracking-widest uppercase py-12 text-center">
            No teams found
          </div>`;
        return;
      }

      filtered.forEach((team, i) => {
        container.appendChild(makeCard(team, (i % 12) * 0.05 + 0.05));
      });
    }

    function setRegion(region) {
      activeRegion = region;
      document.querySelectorAll(".region-tab").forEach(btn => {
        const active = btn.dataset.region === region;
        btn.classList.toggle("text-vr",  active);
        btn.classList.toggle("border-vr", active);
        btn.classList.toggle("text-vg",  !active);
        btn.classList.toggle("border-vb", !active);
      });
      renderCards();
    }

    // Build region tabs
    const tabBar = document.getElementById("region-tabs");
    REGIONS.forEach(r => {
      const btn = document.createElement("button");
      btn.className = "region-tab btn-sweep border py-1.5 px-4 text-[9px] tracking-[0.2em] uppercase font-bold cut-br";
      btn.dataset.region = r;
      btn.textContent = r;
      btn.addEventListener("click", () => setRegion(r));
      tabBar.appendChild(btn);
    });

    // Search
    document.getElementById("search-input").addEventListener("input", e => {
      searchQuery = e.target.value.trim().toLowerCase();
      renderCards();
    });

    // Load teams.json
    fetch(`${BASE_URL}/teams.json`)
      .then(r => r.json())
      .then(data => {
        allTeams = data.teams || [];
        setRegion("All");
      })
      .catch(() => {
        container.innerHTML = `
          <div class="col-span-full text-vr text-sm tracking-widest uppercase py-12 text-center">
            Failed to load team data
          </div>`;
      });
  </script>
</body>
</html>
