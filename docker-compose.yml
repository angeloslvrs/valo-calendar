services:
  scraper:
    build: .
    container_name: valo-calendar-scraper
    restart: unless-stopped
    volumes:
      - ics-data:/app/ics

  web:
    image: caddy:alpine
    container_name: valo-calendar-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ics-data:/srv/ics:ro
      - ./index.html:/srv/index.html:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  ics-data:
  caddy_data:
  caddy_config:
